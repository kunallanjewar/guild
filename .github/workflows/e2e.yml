# Docker E2E: full-loop guild scenarios (MCP stdio round-trips, golden
# transcripts) inside an isolated container. See test/e2e/README.md.
#
# Scoped to paths that can change in-container behavior; docs-only PRs
# skip it.
name: E2E

on:
  pull_request:
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'Dockerfile'
      - 'test/e2e/**'
      - 'Makefile'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/e2e.yml'

jobs:
  e2e-docker:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true
      - uses: docker/setup-buildx-action@v3
      # Build via buildx with the GitHub Actions layer cache so the Go
      # module download + asset staging layers are reused across runs;
      # a cold build is the slow path, the scenario suite itself is fast.
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: guild:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=ci
            COMMIT=${{ github.sha }}
            DATE=1970-01-01T00:00:00Z
      - name: Run e2e scenario suite
        run: make e2e GUILD_E2E_IMAGE=guild:latest
