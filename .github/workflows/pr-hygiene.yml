name: PR Hygiene

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  semantic-title:
    name: semantic PR title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            chore
            docs
            refactor
            ci
            test
            build
            perf
          scopes: |
            quest
            lore
            mcp
            cli
            init
            install
            hints
            ci
            e2e
            release
            docs
            readme
            deps
            issues
            daemon
            sleep
            hooks
          requireScope: false
          subjectPattern: ^[^A-Z].+$
          subjectPatternError: |
            The subject "{subject}" found in PR title "{title}"
            didn't match the configured pattern. Subject should not start
            with an uppercase character.

  size-label:
    name: size label
    runs-on: ubuntu-latest
    steps:
      - uses: codelytv/pr-size-labeler@v1
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          xs_label: 'size: XS'
          xs_max_size: '10'
          s_label: 'size: S'
          s_max_size: '50'
          m_label: 'size: M'
          m_max_size: '200'
          l_label: 'size: L'
          l_max_size: '500'
          xl_label: 'size: XL'
          fail_if_xl: 'false'
          message_if_xl: >
            This PR exceeds 500 LOC. Consider splitting into smaller PRs
            for easier review. Not a hard block.
          files_to_ignore: |
            go.sum
            docs/generated/**
            docs/assets/**
