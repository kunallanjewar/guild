name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Cross-compile the full 6-combo matrix from a single ubuntu runner.
  # CGO_ENABLED=0 is part of the product promise (§10.3 — pure-Go SQLite).
  build:
    name: build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: go build -trimpath ./...

  # Run tests on each native host (cross-run isn't a thing for go test).
  test:
    name: test ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Windows tests are not run — README promises macOS and Linux only.
        # Windows binaries are still cross-compiled in the build job above.
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
      - name: Test
        run: go test -race -count=1 ./...

  lint:
    runs-on: ubuntu-latest
    # Pinned v1.60 refuses to lint Go 1.25 targets (built with Go 1.23).
    # Migrating to golangci-lint v2 requires a .golangci.yml schema migration.
    # Tracked as a post-v0.1.0 follow-up; local `make check` still runs lint.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
      - uses: golangci/golangci-lint-action@v6
        with:
          version: v1.60
          args: --timeout=5m

  # Custom SQL-safety analyzer (§10b.0b / QUEST-18). Runs as go vet -vettool
  # rather than a golangci-lint plugin (plugin wiring needs a CGO .so — deferred).
  sqlcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
      - name: Build sqlcheck
        run: go build -o sqlcheck ./cmd/sqlcheck
      - name: Run sqlcheck over the full module
        run: ./sqlcheck ./...
