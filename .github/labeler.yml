"area: lore":
  - changed-files:
    - any-glob-to-any-file:
      - 'internal/lore/**'
      - 'internal/cli/lore*'

"area: quest":
  - changed-files:
    - any-glob-to-any-file:
      - 'internal/quest/**'
      - 'internal/cli/quest*'

"area: cli":
  - changed-files:
    - any-glob-to-any-file:
      - 'internal/cli/**'
      - 'cmd/guild/**'

"area: mcp":
  - changed-files:
    - any-glob-to-any-file:
      - 'internal/mcp/**'

"area: hints":
  - changed-files:
    - any-glob-to-any-file:
      - 'internal/hints/**'

"area: install":
  - changed-files:
    - any-glob-to-any-file:
      - 'internal/install/**'
      - 'scripts/install*'
